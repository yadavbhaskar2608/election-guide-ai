<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Runner — Election Guide AI</title>
  <style>
    :root {
      --pass: #22c55e;
      --fail: #ef4444;
      --warn: #f59e0b;
      --bg: #0d0f1a;
      --bg-card: #161829;
      --border: rgba(255,255,255,0.08);
      --text: #f0f2ff;
      --text-muted: #9da3cc;
      --primary: #FF6B35;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      line-height: 1.6;
    }

    .container { max-width: 820px; margin: 0 auto; }

    header { margin-bottom: 32px; text-align: center; }
    header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    header h1 span { color: var(--primary); }
    header p { color: var(--text-muted); font-size: 0.95rem; }

    /* Summary Bar */
    #summary {
      display: flex; gap: 16px; flex-wrap: wrap;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px;
      margin-bottom: 28px; align-items: center;
    }
    .summary-stat {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; min-width: 80px;
    }
    .summary-num { font-size: 2rem; font-weight: 800; line-height: 1; }
    .summary-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .num-pass { color: var(--pass); }
    .num-fail { color: var(--fail); }
    .num-total { color: var(--primary); }

    .progress-bar-wrap {
      flex: 1; min-width: 200px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px; height: 12px; overflow: hidden;
    }
    #progressBar {
      height: 100%; border-radius: 8px;
      background: linear-gradient(90deg, var(--pass), #16a34a);
      transition: width 0.6s ease;
    }

    /* Test Results List */
    #results { display: flex; flex-direction: column; gap: 8px; }

    .test-item {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      transition: border-color 0.2s;
    }
    .test-item.pass { border-left: 3px solid var(--pass); }
    .test-item.fail { border-left: 3px solid var(--fail); border-color: rgba(239,68,68,0.3); }

    .test-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
    .test-name { font-size: 0.9rem; font-weight: 500; }
    .test-error {
      font-size: 0.8rem; color: var(--fail);
      margin-top: 4px; font-family: 'Courier New', monospace;
      background: rgba(239,68,68,0.08);
      padding: 6px 10px; border-radius: 6px;
      white-space: pre-wrap; word-break: break-word;
    }

    /* Section headers */
    .section-header {
      font-size: 0.75rem; font-weight: 700; color: var(--primary);
      text-transform: uppercase; letter-spacing: 1px;
      margin: 24px 0 8px; padding-left: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-header::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    footer {
      text-align: center; margin-top: 40px;
      color: var(--text-muted); font-size: 0.8rem;
    }
    footer a { color: var(--primary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    #runBtn {
      padding: 10px 24px; border-radius: 8px;
      background: linear-gradient(135deg, #FF6B35, #FFB347);
      border: none; color: #fff; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    #runBtn:hover { opacity: 0.85; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>🧪 Test Runner — <span>Election Guide AI</span></h1>
    <p>Browser-based unit tests for <code>script.js</code> · No build tools required</p>
  </header>

  <div id="summary">
    <div class="summary-stat">
      <div class="summary-num num-total" id="totalNum">—</div>
      <div class="summary-label">Total</div>
    </div>
    <div class="summary-stat">
      <div class="summary-num num-pass" id="passNum">—</div>
      <div class="summary-label">Passed</div>
    </div>
    <div class="summary-stat">
      <div class="summary-num num-fail" id="failNum">—</div>
      <div class="summary-label">Failed</div>
    </div>
    <div class="progress-bar-wrap" aria-label="Test pass rate">
      <div id="progressBar" style="width:0%" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
    </div>
    <button id="runBtn" type="button">▶ Run Tests</button>
  </div>

  <div id="results" role="log" aria-label="Test results" aria-live="polite"></div>

  <footer>
    <p>← <a href="../index.html">Back to Election Guide AI</a></p>
  </footer>

</div>

<!-- Load the main application script first (provides global functions) -->
<script src="../script.js"></script>
<!-- Load the test definitions — tests run synchronously as the file executes -->
<script src="./script.test.js"></script>
<!-- Render results immediately after tests have run -->
<script>
  'use strict';

  /**
   * Groups test result names into categories by their prefix.
   * @param {Array} results
   * @returns {Object.<string, Array>}
   */
  function groupResults(results) {
    const groups = {};
    results.forEach(r => {
      const prefix = r.name.split(' — ')[0] || 'General';
      if (!groups[prefix]) groups[prefix] = [];
      groups[prefix].push(r);
    });
    return groups;
  }

  /**
   * Renders the test results into the DOM.
   */
  function renderResults() {
    const allResults = getResults();
    const passed = allResults.filter(r => r.passed).length;
    const failed = allResults.length - passed;
    const pct = allResults.length ? Math.round((passed / allResults.length) * 100) : 0;

    // Update summary
    document.getElementById('totalNum').textContent = allResults.length;
    document.getElementById('passNum').textContent  = passed;
    document.getElementById('failNum').textContent  = failed;

    const bar = document.getElementById('progressBar');
    bar.style.width = pct + '%';
    bar.setAttribute('aria-valuenow', pct);
    if (failed > 0) bar.style.background = 'linear-gradient(90deg, #ef4444, #dc2626)';

    // Render grouped test items
    const container = document.getElementById('results');
    container.innerHTML = '';
    const groups = groupResults(allResults);

    Object.entries(groups).forEach(([groupName, items]) => {
      const headerEl = document.createElement('div');
      headerEl.className = 'section-header';
      headerEl.textContent = groupName;
      container.appendChild(headerEl);

      items.forEach(r => {
        const div = document.createElement('div');
        div.className = 'test-item ' + (r.passed ? 'pass' : 'fail');
        div.setAttribute('role', 'listitem');

        const icon = document.createElement('span');
        icon.className = 'test-icon';
        icon.textContent = r.passed ? '✅' : '❌';
        icon.setAttribute('aria-hidden', 'true');

        const content = document.createElement('div');
        const name = document.createElement('div');
        name.className = 'test-name';
        name.textContent = r.name.includes(' — ') ? r.name.split(' — ').slice(1).join(' — ') : r.name;
        content.appendChild(name);

        if (!r.passed && r.error) {
          const err = document.createElement('pre');
          err.className = 'test-error';
          err.textContent = r.error;
          content.appendChild(err);
        }

        div.appendChild(icon);
        div.appendChild(content);
        container.appendChild(div);
      });
    });

    document.title = `${passed}/${allResults.length} Tests Passed — Election Guide AI`;
  }

  // Run immediately — tests already executed synchronously above
  renderResults();

  // Run Tests button: re-run by reloading the page
  document.getElementById('runBtn').addEventListener('click', () => {
    window.location.href = window.location.href;
  });
</script>
</body>
</html>
